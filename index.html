<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sass House Sassalyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0a0a0f;
    /* Updated to Glassmorphism standards (v1.3) */
    --bg-panel:   rgba(24, 24, 31, 0.82); 
    --bg-card:    rgba(29, 29, 40, 0.65);
    --bg-input:   rgba(14, 14, 21, 0.8);
    --border:     rgba(42, 42, 58, 0.5);
    --red:        #e03030;
    --red-bright: #ff4444;
    --red-dim:    #9e1f1f;
    --red-glow:   rgba(220,48,48,0.18);
    --red-bg:     rgba(220,48,48,0.12);
    --blue:       #4fc3f7;
    --blue-dim:   #1e88e5;
    --blue-glow:  rgba(79,195,247,0.16);
    --blue-bg:    rgba(79,195,247,0.12);
    --green:      #52e89a;
    --green-dim:  #1e9955;
    --green-bg:   rgba(82,232,154,0.1);
    --warn:       #ff8c3d;
    --warn-bg:    rgba(255,140,61,0.1);
    --grey:       #4a607a;
    --grey-bg:    rgba(74,96,122,0.12);
    --text:       #e2e8f0;
    --text-muted: #94a3b8;
    --text-dim:   #475569;
    --gold:       #ffd700;
    --gold-dim:   #b89a0a;
    --gold-glow:  rgba(255,215,0,0.25);
    --gold-bg:    rgba(255,215,0,0.1);
    --silver:     #a8c4d8;
    --silver-dim: #5a8090;
    --silver-bg:  rgba(168,196,216,0.1);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family:'Nunito',sans-serif;
    background-color: var(--bg);
    background-image: url('background.jpg');
    background-repeat: no-repeat;
    background-position: center center;
    background-attachment: fixed;
    background-size: cover;
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  /* READABILITY OVERLAY */
  body::before {
    content:''; position:fixed; inset:0;
    background: rgba(10, 10, 15, 0.72);
    pointer-events:none; z-index:0;
  }

  /* PORTRAIT OPTIMIZATION: Keeps characters at the sides of the panel */
  @media (orientation: portrait) {
    body {
      background-size: 100vw auto; 
      background-position: center top;
      background-attachment: scroll;
      background-image: 
        linear-gradient(to bottom, transparent 0%, var(--bg) 75vh),
        url('background.jpg');
    }
    .app-wrapper {
      width: 92% !important;
      padding: 10px 10px 40px !important;
    }
    .char-wrap { display: none; } /* Clear space for background characters */
    .summary-panel { flex-direction: column; align-items: stretch; text-align: center; }
    .verdict { text-align: center; margin-top: 10px; }
  }

  #dino-bg { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
  .bg-dino { position:absolute; opacity:0; animation:dinoDrift linear infinite; filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }

  @keyframes dinoDrift {
    0%   { opacity:0;              transform:translateY(30px)  rotate(var(--rot)); }
    8%   { opacity:var(--op); }
    92%  { opacity:var(--op); }
    100% { opacity:0;              transform:translateY(-40px) rotate(var(--rot)); }
  }

  .app-wrapper { position:relative; z-index:2; max-width:920px; margin:0 auto; padding:20px 20px 60px; }

  /* ── TOOLTIPS ── */
  .tip { position:relative; display:inline-flex; align-items:center; }
  .tip-box {
    position:absolute; bottom:calc(100% + 8px); left:50%;
    transform:translateX(-50%) translateY(4px);
    background:#1a0808; border:1px solid var(--red-dim);
    border-radius:8px; padding:7px 12px;
    font-size:12px; font-weight:700; color:var(--text);
    pointer-events:none; opacity:0;
    transition:opacity .18s,transform .18s;
    z-index:999; box-shadow:0 4px 18px rgba(0,0,0,0.55);
    letter-spacing:.4px; line-height:1.4;
    max-width:230px; white-space:normal; text-align:center;
  }
  .tip-box::after {
    content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
    border:5px solid transparent; border-top-color:var(--red-dim);
  }
  .tip:hover .tip-box, .tip:focus-within .tip-box { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── HEADER ── */
  .header { position:relative; margin-bottom:36px; }
  .header-inner { display:flex; align-items:flex-end; justify-content:center; gap:0; position:relative; }
  .char-wrap { flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:6px; position:relative; }
  .char-wrap.pistola { margin-right:-22px; z-index:2; }
  .char-wrap.keebs   { margin-left:-22px;  z-index:2; }
  .char-name {
    font-family:'Fredoka One',cursive; font-size:13px; letter-spacing:2px;
    text-transform:uppercase; padding:3px 12px; border-radius:20px; position:relative; z-index:3;
  }
  .char-wrap.pistola .char-name { color:var(--red-bright); background:var(--red-bg); border:1px solid var(--red-dim); }
  .char-wrap.keebs   .char-name { color:var(--blue);       background:var(--blue-bg); border:1px solid var(--blue-dim); }
  .char-svg { display:block; }
  .title-block { flex:1; text-align:center; padding:0 10px 16px; z-index:3; position:relative; }
  .sass-house-label {
    font-family:'Fredoka One',cursive; font-size:11px; letter-spacing:5px;
    text-transform:uppercase; color:var(--text-muted); margin-bottom:6px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .main-title {
    font-family:'Fredoka One',cursive; font-size:clamp(26px,5.5vw,46px);
    line-height:1.05; letter-spacing:1px;
    background:linear-gradient(135deg,var(--red-bright) 0%,#ff8844 45%,var(--blue) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter:drop-shadow(0 2px 14px rgba(220,48,48,0.35));
  }
  .title-tagline { font-size:12px; color:var(--text-muted); letter-spacing:2px; margin-top:6px; font-weight:700; text-transform:uppercase; }

  /* ── PANELS ── */
  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    animation: slideUp .4s ease both;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  }
  .panel:nth-child(2){animation-delay:.07s} .panel:nth-child(3){animation-delay:.14s}
  @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .panel.red-panel::before  { content:''; position:absolute; top:0;left:0;right:0;height:3px; background:linear-gradient(90deg,transparent,var(--red),transparent); }
  .panel.blue-panel::before { content:''; position:absolute; top:0;left:0;right:0;height:3px; background:linear-gradient(90deg,transparent,var(--blue),transparent); }
  .panel-title {
    font-family:'Fredoka One',cursive; font-size:14px; letter-spacing:2px;
    text-transform:uppercase; margin-bottom:16px;
    display:flex; align-items:center; gap:8px; color:var(--text-muted);
  }
  .panel-title::after { content:''; flex:1; height:1px; background:var(--border); margin-left:4px; }

  /* ── LEVEL INPUT ── */
  .level-section { display:flex; align-items:center; gap:24px; flex-wrap:wrap; }
  .input-label { font-size:11px; letter-spacing:2px; color:var(--text-muted); text-transform:uppercase; font-weight:800; margin-bottom:6px; }
  .level-input-wrap { position:relative; display:flex; align-items:center; }
  .level-input {
    background:var(--bg-input); border:2px solid #3a1a1a; border-radius:10px;
    color:var(--red-bright); font-family:'Fredoka One',cursive; font-size:32px;
    width:148px; padding:10px 14px; text-align:center; outline:none; transition:all .2s;
  }
  .level-arrows { display:flex; flex-direction:column; margin-left:8px; gap:4px; }
  .arrow-btn {
    background:var(--bg-card); border:1px solid var(--border); color:var(--text-muted);
    width:28px; height:24px; border-radius:7px; cursor:pointer; font-size:12px;
    display:flex; align-items:center; justify-content:center; transition:all .15s;
  }
  .avg-display { flex:1; min-width:180px; }
  .avg-value-box {
    background:var(--bg-card); border:2px solid var(--border); border-radius:10px;
    padding:14px 20px; position:relative; overflow:hidden;
  }
  .avg-value-num { font-family:'Fredoka One',cursive; font-size:38px; color:var(--red-bright); line-height:1; }

  /* ── STAT GRID ── */
  .grid-header {
    display:grid; grid-template-columns:120px 1fr 120px 90px; gap:10px;
    padding:0 14px 10px; border-bottom:1px solid var(--border); margin-bottom:8px;
  }
  .grid-header span { font-size:10px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; font-family:'Share Tech Mono',monospace; }
  .stat-grid { display:flex; flex-direction:column; gap:8px; }
  .stat-row {
    display:grid; grid-template-columns:120px 1fr 120px 90px; gap:10px; align-items:center;
    padding:12px 14px; background:var(--bg-card); border:2px solid var(--border);
    border-radius:10px; transition:all .2s;
  }
  .stat-row.above { border-color:var(--green-dim); background:var(--green-bg); }
  .stat-row.below { border-color:var(--red-dim);   background:var(--red-bg); }
  .stat-row.exact { border-color:var(--grey);       background:var(--grey-bg); }
  .stat-bar-wrap { position:relative; height:8px; background:rgba(255,255,255,0.04); border-radius:4px; }
  .stat-bar-fill { height:100%; border-radius:4px; transition:width .4s; min-width:3px; background:var(--text-dim); }
  .stat-row.above .stat-bar-fill { background:linear-gradient(90deg,var(--green-dim),var(--green)); }
  .stat-row.below .stat-bar-fill { background:linear-gradient(90deg,var(--red-dim),var(--red-bright)); }
  .stat-bar-avg-marker {
    position:absolute; top:-4px;bottom:-4px; width:3px;
    background:var(--red-bright); border-radius:2px; opacity:.75; transition:left .3s;
  }
  .stat-input {
    background:var(--bg-input); border:2px solid var(--border); border-radius:8px;
    color:var(--text); font-family:'Share Tech Mono',monospace; font-size:16px;
    padding:8px 10px; text-align:center; outline:none; width:100%;
  }
  .variance-badge { font-family:'Share Tech Mono',monospace; font-size:14px; font-weight:700; text-align:right; color:var(--text-dim); }

  /* ── SUMMARY ── */
  .summary-panel {
    background:var(--bg-panel); border:2px solid var(--border); border-radius:14px;
    padding:18px 24px; display:flex; gap:20px; flex-wrap:wrap;
    align-items:center; justify-content:space-between; margin-bottom:16px;
    position:relative; overflow:hidden; animation:slideUp .4s .2s ease both;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  }
  .summary-panel::before { content:''; position:absolute; top:0;left:0;right:0;height:3px; background:linear-gradient(90deg,var(--red),var(--warn),var(--blue)); }
  .summary-stat { display:flex; flex-direction:column; gap:2px; align-items:center; }
  .summary-num { font-family:'Fredoka One',cursive; font-size:30px; line-height:1; }
  .summary-num.green { color:var(--green); }
  .summary-num.rc    { color:var(--red-bright); }
  .summary-num.warn  { color:var(--warn); }
  .summary-label { font-size:10px; letter-spacing:2px; color:var(--text-muted); text-transform:uppercase; font-weight:800; }
  .summary-divider { width:1px; height:40px; background:var(--border); flex-shrink:0; }
  .verdict { flex:1; min-width:160px; text-align:right; }
  .verdict-text { font-family:'Fredoka One',cursive; font-size:14px; letter-spacing:1px; padding:8px 18px; border-radius:30px; display:inline-block; text-transform:uppercase; transition:all .3s; }
  .verdict-text.good    { color:var(--green);      background:var(--green-bg); border:2px solid var(--green-dim); }
  .verdict-text.bad     { color:var(--red-bright);  background:var(--red-bg);   border:2px solid var(--red-dim); }
  .verdict-text.neutral { color:var(--text-muted);  background:var(--grey-bg);  border:2px solid var(--grey); }
  .verdict-text.star    { color:var(--gold); background:var(--gold-bg); border:2px solid var(--gold-dim); box-shadow:0 0 18px var(--gold-glow); animation:starPulse 2s infinite; }
  .verdict-text.weight-star { color:var(--silver); background:var(--silver-bg); border:2px solid var(--silver-dim); }
  @keyframes starPulse { 0%,100% { box-shadow:0 0 12px var(--gold-glow); } 50% { box-shadow:0 0 28px var(--gold-glow); } }

  /* ── SPIKE / PRIORITY ── */
  .stat-row.spike-primary { border-color: var(--gold-dim) !important; background: var(--gold-bg) !important; box-shadow: 0 0 14px var(--gold-glow); }
  .stat-row.spike-primary .stat-bar-fill { background: linear-gradient(90deg, #b89a0a, var(--gold)) !important; }
  .stat-row.spike-primary .variance-badge { color:var(--gold) !important; }
  .stat-row.spike-secondary { border-color: var(--silver-dim) !important; background: var(--silver-bg) !important; }
  .stat-row.spike-secondary .stat-bar-fill { background: linear-gradient(90deg, var(--silver-dim), var(--silver)) !important; }
  .priority-badge { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; padding:2px 6px; border-radius:8px; text-transform:uppercase; font-weight:700; margin-left:4px; }
  .priority-badge.p1 { color:var(--gold);   background:var(--gold-bg);   border:1px solid var(--gold-dim); }
  .priority-badge.p2 { color:var(--silver); background:var(--silver-bg); border:1px solid var(--silver-dim); }

  /* ── BTNS & FOOTER ── */
  .btn-clear { background:transparent; border:2px solid var(--border); color:var(--text-muted); font-family:'Fredoka One',cursive; font-size:14px; letter-spacing:2px; text-transform:uppercase; padding:10px 28px; border-radius:30px; cursor:pointer; display:block; margin:0 auto; transition:0.2s; }
  .btn-clear:hover { border-color:var(--red-dim); color:var(--red-bright); background:var(--red-bg); transform:scale(1.04); }
  .footer { text-align:center; font-size:11px; letter-spacing:2px; color:var(--text-dim); margin-top:32px; font-family:'Share Tech Mono',monospace; text-transform:uppercase; display:flex; align-items:center; justify-content:center; gap:8px; }
  .stat-mode-row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }
  .mode-pill { display:flex; align-items:center; background:var(--bg-input); border:2px solid var(--border); border-radius:30px; padding:3px; gap:3px; }
  .mode-btn { font-family:'Fredoka One',cursive; font-size:12px; letter-spacing:1px; padding:6px 14px; border-radius:22px; border:none; cursor:pointer; background:transparent; color:var(--text-muted); transition:0.2s; }
  .mode-btn.active { background:var(--red-dim); color:var(--text); }
  .mode-btn.active.blue-mode { background:var(--blue-dim); color:#fff; }
  .stat-row.disabled { opacity:0.28; pointer-events:none; position:relative; }
  .stat-row.disabled::after { content:'N/A — No Oxygen Stat'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Fredoka One',cursive; font-size:13px; letter-spacing:2px; color:var(--text-dim); background:rgba(14,14,21,0.55); border-radius:8px; }

  @media(max-width:680px){ .char-svg{width:90px!important} .main-title{font-size:22px} .stat-row,.grid-header{grid-template-columns:90px 1fr 90px 70px} }
</style>
</head>
<body>

<div id="dino-bg"></div>

<div class="app-wrapper">
  <header class="header">
    <div class="header-inner">
      <div class="char-wrap pistola">
        <svg class="char-svg" width="122" height="202" viewBox="0 0 122 202">
           <rect x="34" y="192" width="26" height="3" fill="#c42020"/>
           <circle cx="61" cy="60" rx="33" ry="31" fill="#1c1c1c"/>
           <ellipse cx="61" cy="54" rx="23" ry="21" fill="#e8b898"/>
        </svg>
        <div class="char-name">Pistola</div>
      </div>
      <div class="title-block">
        <div class="sass-house-label">Sass House</div>
        <div class="main-title">Sassalyzer</div>
        <div class="title-tagline">Dino Breeding · Stat Optimizer</div>
      </div>
      <div class="char-wrap keebs">
        <svg class="char-svg" width="122" height="202" viewBox="0 0 122 202">
           <path d="M26,55 C22,33 28,16 61,14 C94,16 100,33 96,55" fill="#f0c040"/>
           <ellipse cx="61" cy="52" rx="24" ry="22" fill="#e8b898"/>
        </svg>
        <div class="char-name">Keebs</div>
      </div>
    </div>
  </header>

  <div class="panel red-panel">
    <div class="panel-title"><span class="icon">💀</span> Configuration</div>
    <div class="level-section">
      <div>
        <div class="input-label">Dino Level</div>
        <div class="level-input-wrap">
          <input type="number" id="dinoLevel" class="level-input" value="150" min="1">
          <div class="level-arrows">
            <button class="arrow-btn" onclick="adjustLevel(1)">▲</button>
            <button class="arrow-btn" onclick="adjustLevel(-1)">▼</button>
          </div>
        </div>
      </div>
      <div class="avg-display">
        <div class="input-label">Average Target Per Stat</div>
        <div class="avg-value-box">
          <div class="avg-value-num" id="avgDisplay">25</div>
        </div>
      </div>
    </div>
    <div class="stat-mode-row">
      <div class="input-label">Stat Count Mode</div>
      <div class="mode-pill">
        <button class="mode-btn active" id="btn6stat" onclick="setStatMode(6)">6 Stats</button>
        <button class="mode-btn"        id="btn5stat" onclick="setStatMode(5)">5 Stats</button>
      </div>
    </div>
  </div>

  <div class="panel blue-panel">
    <div class="panel-title"><span class="icon">🦕</span> Stat Comparator</div>
    <div class="grid-header">
      <span>Stat</span>
      <span>Distribution</span>
      <span style="text-align:center">Points</span>
      <span style="text-align:center">Variance</span>
    </div>
    <div class="stat-grid" id="statGrid"></div>
  </div>

  <div class="summary-panel">
    <div class="summary-stat"><div class="summary-num green" id="sumAbove">0</div><div class="summary-label">Above Avg</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="summary-num warn" id="sumExact">0</div><div class="summary-label">At Average</div></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><div class="summary-num rc" id="sumBelow">0</div><div class="summary-label">Below Avg</div></div>
    <div class="verdict"><span class="verdict-text neutral" id="verdictText">Awaiting Data</span></div>
  </div>

  <button class="btn-clear" onclick="clearStats()">↺ Clear All Stats</button>

  <div class="footer">
    <span>🦖</span> Sass House Sassalyzer v1.3 · Glassmorphism Edition <span>🦕</span>
  </div>
</div>

<script>
const STATS = [
  { key:'health',  name:'Health',  icon:'♥', priority:1 },
  { key:'stamina', name:'Stamina', icon:'⚡', priority:1 },
  { key:'oxygen',  name:'Oxygen',  icon:'◎', priority:0 },
  { key:'food',    name:'Food',    icon:'⬟', priority:0 },
  { key:'weight',  name:'Weight',  icon:'⊞', priority:2 },
  { key:'damage',  name:'Damage',  icon:'⚔', priority:1 },
];

let currentAvg = 25, statMode = 6;

function getAvg() {
  const level = parseInt(document.getElementById('dinoLevel').value) || 150;
  return Math.floor(level / statMode);
}

function setStatMode(n) {
  statMode = n;
  document.getElementById('btn6stat').className = 'mode-btn' + (n===6 ? ' active' : '');
  document.getElementById('btn5stat').className = 'mode-btn' + (n===5 ? ' active blue-mode' : '');
  document.getElementById('row-oxygen').classList.toggle('disabled', n===5);
  updateAvg();
}

function buildGrid() {
  const grid = document.getElementById('statGrid');
  grid.innerHTML = '';
  STATS.forEach(s => {
    const row = document.createElement('div');
    row.className = 'stat-row'; row.id = `row-${s.key}`;
    let bClass = s.priority === 1 ? 'p1' : (s.priority === 2 ? 'p2' : '');
    let bText = s.priority === 1 ? '★ Priority' : (s.priority === 2 ? '★ Notable' : '');
    row.innerHTML = `
      <div class="stat-name"><span class="stat-icon">${s.icon}</span>${s.name}${bClass?`<span class="priority-badge ${bClass}">${bText}</span>`:''}</div>
      <div class="stat-bar-wrap">
        <div class="stat-bar-fill" id="bar-${s.key}" style="width:0%"></div>
        <div class="stat-bar-avg-marker" id="avgmark-${s.key}"></div>
      </div>
      <input type="number" class="stat-input" id="input-${s.key}" placeholder="—" oninput="recalcAll()">
      <div class="variance-badge" id="var-${s.key}">—</div>`;
    grid.appendChild(row);
  });
}

function updateAvg() {
  currentAvg = getAvg();
  document.getElementById('avgDisplay').textContent = currentAvg;
  recalcAll();
}

function recalcAll() {
  let above=0, exact=0, below=0, netSum=0, anyFilled=false, maxVal=1, starSpike=false, weightSpike=false;
  const spikeThresh = Math.max(6, Math.floor(currentAvg * 0.3));

  STATS.forEach(s => {
    const inp = document.getElementById(`input-${s.key}`);
    const v = parseFloat(inp.value);
    if (!isNaN(v)) maxVal = Math.max(maxVal, v);
  });
  const maxStatSeen = Math.max(maxVal, currentAvg * 1.5);

  STATS.forEach(s => {
    const input = document.getElementById(`input-${s.key}`);
    const row = document.getElementById(`row-${s.key}`);
    const vb = document.getElementById(`var-${s.key}`);
    const bar = document.getElementById(`bar-${s.key}`);
    const mk = document.getElementById(`avgmark-${s.key}`);
    
    if (statMode === 5 && s.key === 'oxygen') { bar.style.width='0%'; return; }
    mk.style.left = (currentAvg / maxStatSeen * 100) + '%';
    
    const val = parseFloat(input.value);
    if (isNaN(val)) { row.className='stat-row'; vb.textContent='—'; bar.style.width='0%'; return; }
    anyFilled = true;
    const diff = val - currentAvg;
    netSum += diff;
    bar.style.width = (val / maxStatSeen * 100) + '%';
    
    let state = '';
    if (diff >= spikeThresh) {
      if (s.priority === 1) { state = 'spike-primary'; starSpike = true; }
      else if (s.priority === 2) { state = 'spike-secondary'; weightSpike = true; }
    }
    
    if (state) row.className = 'stat-row ' + state;
    else if (diff > 0.1) { row.className='stat-row above'; above++; }
    else if (diff < -0.1) { row.className='stat-row below'; below++; }
    else { row.className='stat-row exact'; exact++; }
    
    vb.textContent = diff > 0 ? `+${diff}` : (diff === 0 ? '±0' : diff);
  });

  const vd = document.getElementById('verdictText');
  if (anyFilled) {
    if (starSpike) { vd.textContent = '⭐ Star Dino!'; vd.className = 'verdict-text star'; }
    else if (weightSpike) { vd.textContent = '⭐ Weight Star'; vd.className = 'verdict-text weight-star'; }
    else {
      vd.textContent = netSum > 0 ? '✓ Strong Breed' : (netSum < 0 ? '✕ Cull It' : '~ Marginal');
      vd.className = 'verdict-text ' + (netSum > 0 ? 'good' : (netSum < 0 ? 'bad' : 'neutral'));
    }
    document.getElementById('sumAbove').textContent = (above + (starSpike?1:0) + (weightSpike?1:0));
    document.getElementById('sumExact').textContent = exact;
    document.getElementById('sumBelow').textContent = below;
  }
}

function adjustLevel(d) {
  const inp = document.getElementById('dinoLevel');
  inp.value = Math.max(1, (parseInt(inp.value)||150) + d);
  updateAvg();
}

function clearStats() {
  STATS.forEach(s => document.getElementById(`input-${s.key}`).value = '');
  recalcAll();
}

document.getElementById('dinoLevel').addEventListener('input', updateAvg);
buildGrid(); updateAvg();

function spawnDinos() {
  const bg = document.getElementById('dino-bg');
  for (let i = 0; i < 24; i++) {
    const d = document.createElement('div');
    d.className = 'bg-dino';
    d.style.left = Math.random() * 95 + '%';
    d.style.top = Math.random() * 95 + '%';
    d.textContent = Math.random() > 0.5 ? '🦖' : '🦕';
    d.style.opacity = 0.04 + Math.random() * 0.08;
    bg.appendChild(d);
  }
}
spawnDinos();
</script>
